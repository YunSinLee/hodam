name: Security Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  supabase-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      HODAM_ENFORCE_SECRET_CHECKS: ${{ vars.HODAM_ENFORCE_SECRET_CHECKS || '0' }}
      HODAM_SUPABASE_SECURITY_IGNORE_LINTS: ${{ vars.HODAM_SUPABASE_SECURITY_IGNORE_LINTS }}
      HODAM_SUPABASE_SECURITY_ENFORCE_STRICT: ${{ vars.HODAM_SUPABASE_SECURITY_ENFORCE_STRICT }}

    steps:
      - name: Resolve security-check availability
        id: guard
        run: |
          if [ -n "${NEXT_PUBLIC_SUPABASE_URL}" ] && [ -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
            echo "missing=0" >> "$GITHUB_OUTPUT"
            echo "Security checks are enabled."
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "missing=1" >> "$GITHUB_OUTPUT"
            echo "Security checks are skipped because required secrets are missing."
          fi

      - name: Fail when required secrets are missing (strict mode)
        if: ${{ steps.guard.outputs.missing == '1' && env.HODAM_ENFORCE_SECRET_CHECKS == '1' }}
        run: |
          echo "Required secrets are missing and strict mode is enabled." >&2
          exit 1

      - name: Report skipped security checks
        if: ${{ steps.guard.outputs.enabled != '1' }}
        run: |
          echo "::notice::Security checks skipped (missing NEXT_PUBLIC_SUPABASE_URL/NEXT_PUBLIC_SUPABASE_ANON_KEY)."

      - name: Checkout
        if: ${{ steps.guard.outputs.enabled == '1' }}
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ steps.guard.outputs.enabled == '1' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        if: ${{ steps.guard.outputs.enabled == '1' }}
        run: npm ci

      - name: Run Supabase security check
        if: ${{ steps.guard.outputs.enabled == '1' }}
        run: npm run check:supabase:security

      - name: Run strict Supabase security check
        if: ${{ steps.guard.outputs.enabled == '1' }}
        env:
          # Temporary baseline ignores: remove each entry once the underlying platform constraint is resolved.
          HODAM_SUPABASE_SECURITY_IGNORE_LINTS: ${{ vars.HODAM_SUPABASE_SECURITY_IGNORE_LINTS || 'auth_leaked_password_protection,vulnerable_postgres_version' }}
        run: npm run check:supabase:security:strict
